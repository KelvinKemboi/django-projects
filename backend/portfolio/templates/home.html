<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>
</head>
<body>
    <h1>Habit Tracker</h1>
    <table>
        <tr>
            <th>Name</th>
            <th>Category</th>
            <th>Streak</th>
            <th>Created_at</th>
            <th>Description</th>
        </tr>
        {% for x in habits %}
        <tr>
            <td>{{x.name}}</td>
            <td>{{x.category}}</td>
            <td>{{x.streak}} </td>
            <td>{{x.created_at}} </td>
            <td>{{x.description}} </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
